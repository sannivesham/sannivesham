<!DOCTYPE html>
<html lang="te">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>పండుగలు - సన్నివేశం</title>

    <link rel="stylesheet" href="style.css">
</head>

<body class="festivals-body">

    <!-- BACKGROUND -->
    <div class="festivals-bg"></div>

    <!-- LOADER -->
    <div id="loader">

        <div class="loader-content">

            <img src="images/logo.png" class="loader-logo">

            <h1>సన్నివేశం</h1>

            <div class="loader-line"></div>

        </div>

    </div>

    <!-- NAVBAR -->
    <nav class="glass-navbar">

        <a href="index.html#categories">
            ← వెనుకకు
        </a>

        <a href="index.html">
            ప్రారంభం
        </a>

        <a href="festivals.html">
            పండుగలు
        </a>

    </nav>

    <!-- PAGE -->
    <section class="festivals-page">

        <div class="festivals-title-box">
            <h1>పండుగలు</h1>

            <p class="festivals-subtitle">
                భారతీయ మరియు తెలుగు సంప్రదాయ పండుగల సమాహారం
            </p>
        </div>

        <!-- FESTIVALS GRID -->
        <div class="festivals-grid">

          

        </div>

    </section>

    <!-- FOOTER -->


    <footer class="simple-footer">

        <p class="footer-quote">
            ✨ మన పండుగలు మన సంస్కృతి యొక్క ప్రతిబింబం ✨
        </p>

<script type="module" src="social-links.js"></script>
        <p>
            © 2026 సన్నివేశం
        </p>

    </footer>

    <script src="script.js"></script>

    <script type="module">
        import { db } from "./firebase-config.js";

        import {
            doc,
            getDoc
        } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        async function loadFestivalsBackground() {
            const snap = await getDoc(doc(db, "settings", "backgrounds"));
            if (!snap.exists()) return;

            const data = snap.data();
            const bg = document.querySelector(".festivals-bg");

            if (window.innerWidth <= 700 && data.festivalsMobile) {
                bg.style.backgroundImage =
                    `linear-gradient(rgba(15,8,3,0.50), rgba(15,8,3,0.50)), url("${data.festivalsMobile}")`;
            } else if (data.festivalsPc) {
                bg.style.backgroundImage =
                    `linear-gradient(rgba(15,8,3,0.60), rgba(15,8,3,0.60)), url("${data.festivalsPc}")`;
            }
        }

        loadFestivalsBackground();
    </script>
    <script type="module" src="festivals.js"></script>
    <audio id="bgMusic" loop>
  <source src="music/traditional.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn" class="music-btn">
  🔊
</button>

<script src="music.js"></script>
</body>

</html>
