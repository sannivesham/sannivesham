<!DOCTYPE html>
<html lang="te">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>వీడియోలు - సన్నివేశం</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#0d0b08;
    color:white;
}

.header{
    padding:25px;
    text-align:center;
}

.header h1{
    color:#d4af37;
    font-size:32px;
}

.back-btn{
    position:fixed;
    top:20px;
    left:20px;
    background:#1f1b15;
    color:#ffd166;
    border:1px solid #d4af37;
    padding:10px 18px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    z-index:100;
}

.videos-grid{
    width:95%;
    max-width:1300px;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:25px;
}

.video-card{
    background:#1a1612;
    border:1px solid rgba(212,175,55,.35);
    border-radius:18px;
    overflow:hidden;
    text-decoration:none;
    transition:.25s;
}

.video-card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 20px rgba(212,175,55,.35);
}

.video-card img{
    width:100%;
    height:180px;
    object-fit:cover;
    display:block;
}

.video-name{
    padding:15px;
    text-align:center;
    color:#ffd166;
    font-size:18px;
    font-weight:600;
}
</style>

</head>

<body>

<a href="index.html" class="back-btn">
← వెనుకకు
</a>

<div class="header">
<h1>వీడియోలు</h1>
</div>

<div class="videos-grid">

</div>

<!-- IMPORTANT -->
<script type="module" src="video.js"></script>

</body>

</html>
