<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>క్యాలెండర్ - సన్నివేశం</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Noto Sans Telugu', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 30% 20%, #0d2b3e 0%, #071620 45%, #020810 100%);
    overflow: hidden;
    position: relative;
  }

  /* Floating snowflakes */
  .snowflake {
    position: fixed;
    top: -10%;
    color: #bfe9ff;
    text-shadow: 0 0 8px rgba(120, 220, 255, 0.9), 0 0 3px rgba(180, 240, 255, 0.9);
    user-select: none;
    pointer-events: none;
    animation: fall linear infinite;
    z-index: 1;
  }

  @keyframes fall {
    0% {
      transform: translateY(-10vh) translateX(0) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(110vh) translateX(40px) rotate(360deg);
      opacity: 0.2;
    }
  }

  /* Glowing ice orbs in background */
  .ice-shard {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    z-index: 0;
  }

  .ice-shard.one {
    width: 340px;
    height: 340px;
    top: -100px;
    left: -100px;
    background: rgba(41, 182, 246, 0.25);
  }

  .ice-shard.two {
    width: 420px;
    height: 420px;
    bottom: -140px;
    right: -120px;
    background: rgba(0, 229, 255, 0.18);
  }

  .ice-shard.three {
    width: 260px;
    height: 260px;
    top: 55%;
    left: 8%;
    background: rgba(100, 200, 255, 0.15);
  }

  /* Main card */
  .coming-soon-box {
    position: relative;
    z-index: 2;
    background: rgba(10, 25, 40, 0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(120, 200, 255, 0.25);
    border-radius: 32px;
    padding: 60px 45px;
    text-align: center;
    max-width: 520px;
    width: 90%;
    box-shadow:
      0 0 50px rgba(41, 182, 246, 0.15),
      0 8px 40px rgba(0, 0, 0, 0.5),
      inset 0 0 30px rgba(120, 200, 255, 0.06);
  }

  .ice-icon {
    font-size: 60px;
    margin-bottom: 20px;
    display: inline-block;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 0 18px rgba(100, 220, 255, 0.9));
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-14px); }
  }

  .coming-soon-box h1 {
    font-size: 40px;
    font-weight: 700;
    color: #e3f6ff;
    text-shadow: 0 0 20px rgba(100, 220, 255, 0.5);
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  .coming-soon-box p {
    font-size: 18px;
    color: #9fd8f0;
    line-height: 1.8;
    margin-bottom: 30px;
    font-weight: 400;
  }

  .divider-line {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #29b6f6, transparent);
    margin: 0 auto 30px;
    border-radius: 10px;
    box-shadow: 0 0 12px rgba(41, 182, 246, 0.7);
  }

  .back-btn {
    display: inline-block;
    padding: 14px 38px;
    background: linear-gradient(135deg, #0288d1, #01579b);
    color: #e3f6ff;
    text-decoration: none;
    border-radius: 40px;
    font-weight: 600;
    font-size: 16px;
    border: 1px solid rgba(120, 200, 255, 0.35);
    box-shadow: 0 0 25px rgba(2, 136, 209, 0.5);
    transition: 0.3s ease;
  }

  .back-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 35px rgba(41, 182, 246, 0.75);
  }

  @media (max-width: 600px) {
    .coming-soon-box {
      padding: 45px 25px;
    }

    .coming-soon-box h1 {
      font-size: 30px;
    }

    .coming-soon-box p {
      font-size: 15px;
    }

    .ice-icon {
      font-size: 46px;
    }
  }
</style>
</head>

<body>

  <div class="ice-shard one"></div>
  <div class="ice-shard two"></div>
  <div class="ice-shard three"></div>

  <div class="coming-soon-box">
    <div class="ice-icon">❄️</div>
    <h1>త్వరలో వస్తుంది</h1>
    <div class="divider-line"></div>
    <p>
      మా క్యాలెండర్ విభాగం ప్రస్తుతం తయారీలో ఉంది.<br>
      పండుగలు, కార్యక్రమాలు మరియు ముఖ్యమైన తేదీలను<br>
      ఒకే చోట చూసే అవకాశం త్వరలో మీకు అందుబాటులోకి వస్తుంది.
    </p>
    <a href="index.html" class="back-btn">ప్రారంభానికి తిరిగి వెళ్ళండి</a>
  </div>

  <script>
    const flakes = ["❄", "❅", "❆"];
    const body = document.body;
    const flakeCount = 35;

    for (let i = 0; i < flakeCount; i++) {
      const flake = document.createElement("div");
      flake.className = "snowflake";
      flake.textContent = flakes[Math.floor(Math.random() * flakes.length)];
      flake.style.left = Math.random() * 100 + "vw";
      flake.style.fontSize = (Math.random() * 18 + 10) + "px";
      flake.style.animationDuration = (Math.random() * 6 + 6) + "s";
      flake.style.animationDelay = (Math.random() * 5) + "s";
      flake.style.opacity = Math.random() * 0.7 + 0.3;
      body.appendChild(flake);
    }
  </script>

</body>
</html>
