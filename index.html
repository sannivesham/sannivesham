<!DOCTYPE html>
<html lang="te">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>సన్నివేశం</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Noto Sans Telugu', sans-serif;
    color:white;
    overflow-x:hidden;
    min-height:100vh;
    background:black;
}

/* ================= BACKGROUND IMAGE ================= */

.bg-image{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-10;

    background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.88)),
    url("https://images.unsplash.com/photo-1518562180175-34a163b1a9a6?q=80&w=1600&auto=format&fit=crop");

    background-size:cover;
    background-position:center;

    filter:contrast(1.15);
}

/* ================= SKY ENERGY ================= */

.sky-energy{
    position:fixed;
    width:200%;
    height:200%;
    top:-50%;
    left:-50%;
    z-index:-9;

    background:
    radial-gradient(circle at 20% 30%, rgba(255,140,0,0.10), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(120,160,255,0.10), transparent 45%),
    radial-gradient(circle at 40% 80%, rgba(255,200,100,0.08), transparent 50%);

    animation:skyMove 25s linear infinite;
    pointer-events:none;
}

@keyframes skyMove{
    0%{transform:translate(0px,0px) scale(1);}
    50%{transform:translate(-80px,60px) scale(1.1);}
    100%{transform:translate(0px,0px) scale(1);}
}

/* ================= DIVINE LIGHT ================= */

.divine-light{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-8;

    background:
    radial-gradient(circle at center,
    rgba(255,140,0,0.14),
    transparent 50%);

    animation:divinePulse 5s ease-in-out infinite;
}

@keyframes divinePulse{
    0%{opacity:0.5;}
    50%{opacity:1;}
    100%{opacity:0.5;}
}

/* ================= PARTICLES ================= */

.floating-particles{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-7;
    pointer-events:none;

    background-image:
    radial-gradient(rgba(255,180,80,0.30) 1px, transparent 2px),
    radial-gradient(rgba(255,120,0,0.20) 1px, transparent 2px);

    background-size:120px 120px;
    animation:particlesMove 20s linear infinite;
}

@keyframes particlesMove{
    from{transform:translateY(0px);}
    to{transform:translateY(-250px);}
}

/* ================= FOG ================= */

.fog-layer{
    position:fixed;
    width:200%;
    height:100%;
    top:0;
    left:-50%;
    z-index:-6;
    opacity:0.08;

    background:
    radial-gradient(circle,
    rgba(255,255,255,0.08) 1px,
    transparent 3px);

    background-size:180px 180px;
    animation:fogMove 80s linear infinite;
}

@keyframes fogMove{
    from{transform:translateX(0);}
    to{transform:translateX(300px);}
}

/* ================= LIGHTNING ================= */

.lightning{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-5;
    animation:flash 7s infinite;
}

@keyframes flash{
    0%,90%,100%{background:transparent;}
    92%{background:rgba(255,255,255,0.06);}
}

/* ================= INTRO ================= */

#intro{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:99999;

    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;

    background:
    radial-gradient(circle,
    rgba(255,140,0,0.15),
    transparent 40%),
    #000;

    animation:fadeOut 1s ease 4s forwards;
}

.intro-symbol{
    font-size:65px;
    margin-bottom:15px;
    animation:glowPulse 2s infinite alternate;
}

#intro h1{
    font-size:56px;

    background: linear-gradient(270deg,#2b1055,#7597de,#ffb347,#2b1055);
    background-size: 600% 600%;
    animation: gradientMove 6s ease infinite, introZoom 1.6s ease-out forwards;

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    transform: scale(0.4);
    opacity: 0;
}

@keyframes glowPulse{
    from{opacity:0.6;transform:scale(0.95);}
    to{opacity:1;transform:scale(1.05);}
}

@keyframes introZoom{
    0%{transform:scale(0.4);opacity:0;filter:blur(8px);}
    60%{opacity:1;filter:blur(0px);}
    100%{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
    to{opacity:0;visibility:hidden;}
}

/* ================= NAVBAR ================= */

.navbar{
    position:sticky;
    top:0;
    z-index:999;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:22px;
    padding:18px;
    background:rgba(0,0,0,0.72);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,180,80,0.12);
}

.navbar a{
    text-decoration:none;
    color:#ffd9a3;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
}

.navbar a:hover{
    color:#ffb347;
}

/* ================= MUSIC ================= */

#musicBtn{
    position:fixed;
    top:85px;
    right:18px;
    width:58px;
    height:58px;
    border-radius:50%;
    border:none;
    background:linear-gradient(135deg,#ff9a2f,#ff6a00);
    color:white;
    font-size:24px;
    z-index:100000;
    cursor:pointer;
}

/* ================= HEADER ================= */

.header{
    text-align:center;
    padding:80px 20px 40px;
}

.logo-container{
    width:190px;
    height:190px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:3px solid rgba(255,180,80,0.3);
    box-shadow:0 0 40px rgba(255,140,0,0.25);
}

.logo{
    width:100%;
    height:100%;
    object-fit:cover;
}

.title{
    margin-top:35px;
    font-size:72px;
    font-weight:800;
    letter-spacing:2px;

    background: linear-gradient(270deg,#2b1055,#7597de,#ffb347,#2b1055);
    background-size: 600% 600%;
    animation: gradientMove 6s ease infinite;

    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ================= SECTION ================= */

.section{
    width:92%;
    max-width:950px;
    margin:30px auto;
    background:rgba(10,10,10,0.82);
    border-radius:26px;
    padding:35px;
    border:1px solid rgba(255,180,80,0.14);
}

.section h2{
    text-align:center;
    color:#ffcc99;
    margin-bottom:28px;
    font-size:34px;
}

/* ================= GRID ================= */

.grid-box{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:22px;
}

/* ================= BUTTONS ================= */

.btn{
    display:flex;
    justify-content:center;
    align-items:center;

    min-height:110px;

    border-radius:20px;

    text-decoration:none;

    font-size:20px;
    font-weight:bold;

    color:#fff3dd;

    background: linear-gradient(270deg,#2b1055,#7597de,#ffb347,#2b1055);
    background-size: 600% 600%;
    animation: gradientMove 6s ease infinite;

    transition:0.3s;

    box-shadow:0 5px 18px rgba(0,0,0,0.25);
}

.btn:hover{
    transform:translateY(-6px) scale(1.03);
}

/* ================= ANIMATIONS ================= */

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ================= MOBILE ================= */

@media(max-width:700px){
    .grid-box{
        grid-template-columns:1fr 1fr;
        gap:16px;
    }

    .title{
        font-size:52px;
    }

    .btn{
        font-size:16px;
        min-height:120px;
    }

    .navbar a{
        font-size:14px;
    }
}

/* ================= MUSIC ANIMATION KEYFRAME ================= */

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <div class="intro-symbol">⚔️</div>
    <h1>సన్నివేశం</h1>
</div>

<!-- BACKGROUND -->
<div class="bg-image"></div>
<div class="sky-energy"></div>
<div class="divine-light"></div>
<div class="floating-particles"></div>
<div class="fog-layer"></div>
<div class="lightning"></div>

<!-- NAVBAR -->
<div class="navbar">

    <a href="#home">ముఖ్యపుట</a>
    <a href="#sections">సృజనాత్మక విభాగాలు</a>
    <a href="#social">మాతో కలవండి</a>
    <a href="#about">మా గురించి</a>
    <a href="#contact">సంప్రదించండి</a>

</div>

<!-- HEADER -->
<div class="header" id="home">

    <div class="logo-container">
        <img src="https://raw.githubusercontent.com/sannivesham/phothos.sannivesham/main/Logo%20(1).png" class="logo">
    </div>

    <div class="title">సన్నివేశం</div>

</div>

<!-- REST CONTENT (unchanged) -->
<!-- (You already have sections below: social, about, contact, footer, script) -->

<!-- MUSIC + SCRIPT -->
<audio id="bgMusic" loop>
<source src="https://raw.githubusercontent.com/sannivesham/phothos.sannivesham/main/WhatsApp%20Audio%202026-04-07%20at%2022.41.48%20(1).mpeg">
</audio>

<button id="musicBtn">🔊</button>

<script>

setTimeout(()=>{
document.getElementById("intro").style.display="none";
},4000);

const music=document.getElementById("bgMusic");
const btn=document.getElementById("musicBtn");

music.play().catch(()=>{});

document.body.addEventListener("click",()=>{
music.play();
},{once:true});

btn.onclick=()=>{
if(music.paused){
music.play();
btn.innerHTML="🔊";
}else{
music.pause();
btn.innerHTML="🔇";
}
};

</script>

</body>
</html>
