\<!DOCTYPE html>
<html>
<head>
    <title>సన్నివేశం</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Telugu Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        body {
            margin: 0;
            font-family: 'Noto Sans Telugu', sans-serif;
            background: linear-gradient(135deg, #fdf6e3, #fceabb);
            position: relative;
            overflow-x: hidden;
            color: #333;
        }

        /* BACKGROUND DESIGN */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 20% 20%, rgba(255,140,0,0.15) 2px, transparent 2px),
                radial-gradient(circle at 80% 60%, rgba(255,120,0,0.15) 2px, transparent 2px),
                radial-gradient(circle at 40% 80%, rgba(255,100,0,0.15) 2px, transparent 2px);
            background-size: 120px 120px;
            z-index: -1;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: center;
            gap: 30px;
            background: #ff9933;
            padding: 14px;
            font-weight: bold;
        }

        .navbar a {
            color: white;
            text-decoration: none;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 20px;
            animation: fadeIn 1s ease;
        }

        .logo {
            width: 140px;
            border-radius: 50%;
            transition: 0.4s;
        }

        .logo:hover {
            transform: scale(1.1);
        }

        .brand {
            font-size: 32px;
            color: #ff6600;
            font-weight: bold;
        }

        /* SECTION */
        .section {
            background: rgba(255,255,255,0.95);
            margin: 15px;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            animation: fadeUp 0.8s ease;
            transition: 0.3s;
        }

        .section:hover {
            transform: translateY(-5px);
        }

        /* BUTTONS */
        .btn {
            display: block;
            margin: 12px auto;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            width: 85%;
            text-align: center;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .event-btn { background: #ff9933; }
        .insta { background: #E1306C; }
        .youtube { background: red; }
        .call { background: green; }
        .whatsapp { background: #25D366; }

        /* SPEAKER BUTTON (TOP RIGHT) */
        #musicBtn {
            position: fixed;
            top: 80px;
            right: 15px;
            background: #ff9933;
            border: none;
            border-radius: 50%;
            padding: 12px;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 999;
        }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* DESKTOP IMPROVEMENT */
        @media (min-width: 768px) {
            .section {
                width: 50%;
                margin: 25px auto;
            }

            .btn {
                width: 60%;
            }

            .navbar {
                gap: 50px;
                font-size: 18px;
            }
        }

    </style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" loop>
    <source src="https://raw.githubusercontent.com/sannivesham/sannivesham/main/WhatsApp%20Audio%202026-04-07%20at%2022.41.48.mpeg" type="audio/mpeg">
</audio>

<button id="musicBtn">🔊</button>

<!-- NAVBAR -->
<div class="navbar">
    <a href="#">Home</a>
    <a href="events.html">Events</a>
    <a href="books.html">Books</a>
    <a href="festivals.html">Festivals</a>
</div>

<!-- HEADER -->
<div class="header">
    <img src="https://raw.githubusercontent.com/sannivesham/sannivesham/main/Logo%20(2).png" class="logo">
    <div class="brand">సన్నివేశం</div>
</div>

<!-- MAIN -->
<div class="section">
    <h2>సృజనాత్మక విభాగాలు</h2>

    <a href="events.html" class="btn event-btn">ప్రతిభా వేదిక 🎭</a>
    <a href="festivals.html" class="btn event-btn">పండుగలు 🎉</a>
    <a href="books.html" class="btn event-btn">పుస్తకాలు 📚</a>
</div>

<!-- SOCIAL -->
<div class="section">
    <h2>Follow Us 🔗</h2>

    <a href="https://www.instagram.com/sannivesham?igsh=NjhiZzBtNHBtd2g1" class="btn insta">Instagram</a>
    <a href="https://youtube.com/@sannivesham" class="btn youtube">YouTube</a>
</div>

<!-- CONTACT -->
<div class="section">
    <h2>Get in Touch 📞</h2>

    <a href="tel:9493226037" class="btn call">Call</a>
    <a href="https://wa.me/919493226037" class="btn whatsapp">WhatsApp</a>
</div>

<!-- SCRIPT -->
<script>
let music = document.getElementById("bgMusic");
let btn = document.getElementById("musicBtn");
let started = false;

document.body.addEventListener("click", function () {
    if (!started) {
        music.play();
        started = true;
    }
}, { once: true });

btn.onclick = function () {
    if (music.paused) {
        music.play();
        btn.innerHTML = "🔊";
    } else {
        music.pause();
        btn.innerHTML = "🔇";
    }
};
</script>

</body>
</html>
