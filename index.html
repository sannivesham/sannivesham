<!DOCTYPE html>
<html>
<head>
    <title>సన్నివేశం</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Noto Sans Telugu', sans-serif;
            background: linear-gradient(to bottom, #fff7e6, #ffe4c4);
            color: #333;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-around;
            background: #ff9933;
            padding: 12px;
            position: sticky;
            top: 0;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 20px;
            animation: fadeIn 1s;
        }

        .logo {
            width: 90px;
            border-radius: 50%;
        }

        h1 {
            color: #ff6600;
        }

        .tag {
            color: #666;
        }

        /* CARDS */
        .section {
            background: white;
            margin: 15px;
            padding: 18px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: fadeIn 1s;
        }

        .section p {
            line-height: 1.7;
        }

        /* BUTTONS */
        .btn {
            display: block;
            margin: 10px auto;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            width: 80%;
            text-align: center;
        }

        .event-btn {
            background: #ff9933;
        }

        .insta {
            background: #E1306C;
        }

        .youtube {
            background: red;
        }

        .call {
            background: green;
        }

        .whatsapp {
            background: #25D366;
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        /* DESKTOP */
        @media (min-width: 768px) {
            .section {
                width: 60%;
                margin: 20px auto;
            }

            .btn {
                width: auto;
                display: inline-block;
                margin: 10px;
            }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="#">Home</a>
    <a href="events.html" target="_blank">Events</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
</div>

<!-- HEADER -->
<div class="header">
    <img src="https://raw.githubusercontent.com/sannivesham/sannivesham/main/Logo%20(2).png" class="logo">
    <div class="tag">తెలుగు 🌸</div>
    <h1>సన్నివేశం</h1>
</div>

<!-- ABOUT -->
<div class="section" id="about">
    <p>
        సంస్కృతి • సంప్రదాయం • సంభాషణ <br><br>
        మన సంప్రదాయాల సౌందర్యాన్ని పంచే వేదిక 🌿 <br>
        సృజనాత్మక ఆలోచనలకు ఒక కొత్త దారి ✨
    </p>
</div>

<!-- EVENTS -->
<div class="section">
    <h2>మా కార్యక్రమాలు</h2>
    <a href="events.html" target="_blank" class="btn event-btn">
        ప్రతిభా వేదిక 🎭
    </a>
</div>

<!-- SOCIAL -->
<div class="section">
    <a href="https://www.instagram.com/sannivesham?igsh=NjhiZzBtNHBtd2g1" target="_blank" class="btn insta">
        <i class="fa-brands fa-instagram"></i> Instagram
    </a>

    <a href="https://youtube.com/@sannivesham" target="_blank" class="btn youtube">
        <i class="fa-brands fa-youtube"></i> YouTube
    </a>
</div>

<!-- CONTACT -->
<div class="section" id="contact">
    <h2>Get in Touch 📞</h2>

    <a href="tel:9493226037" class="btn call">
        📞 Call Now
    </a>

    <a href="https://wa.me/919493226037" target="_blank" class="btn whatsapp">
        💬 WhatsApp
    </a>
</div>

</body>
</html>
