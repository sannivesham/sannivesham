<!DOCTYPE html>
<html>
<head>
    <title>Sannivesham</title>

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to bottom, #0d0d0d, #1a1a1a);
            color: white;
        }

        .header {
            text-align: center;
            padding: 30px 20px 10px;
        }

        .logo {
            width: 120px;
            border-radius: 50%;
            border: 3px solid #ff9933;
        }

        .telugu {
            margin-top: 10px;
            color: #ccc;
            font-size: 16px;
        }

        h1 {
            color: #ff9933;
            margin: 5px 0;
            font-size: 30px;
        }

        .about {
            background: #1f1f1f;
            margin: 20px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .about p {
            color: #ccc;
            line-height: 1.7;
        }

        .buttons {
            text-align: center;
            margin: 30px 0;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 22px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .insta {
            background: #E1306C;
        }

        .youtube {
            background: #FF0000;
        }

        .btn i {
            margin-right: 8px;
        }

        .event-btn {
            display:inline-block;
            margin-top:10px;
            padding:12px 20px;
            background:#ff9933;
            color:black;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <img src="https://raw.githubusercontent.com/sannivesham/sannivesham/main/Logo%20(2).png" class="logo">

        <div class="telugu">తెలుగు 🌸</div>
        <h1>సన్నివేశం</h1>
    </div>

    <!-- ABOUT -->
    <div class="about">
        <p>
            సంస్కృతి • సంప్రదాయం • సంభాషణ <br><br>
            సంప్రదాయానికి స్వరం <br>
            ఆలోచనలకు విరామం 🕊️
        </p>
    </div>

    <!-- EVENTS -->
    <div class="about">
        <h2>మా కార్యక్రమాలు</h2>
        <a href="events.html" class="event-btn">
            ప్రతిభా వేదిక 🎭
        </a>
    </div>

    <!-- SOCIAL -->
    <div class="buttons">
        <a href="https://www.instagram.com/sannivesham?igsh=NjhiZzBtNHBtd2g1" target="_blank" class="btn insta">
            <i class="fa-brands fa-instagram"></i> Instagram
        </a>

        <a href="https://youtube.com/@sannivesham" target="_blank" class="btn youtube">
            <i class="fa-brands fa-youtube"></i> YouTube
        </a>
    </div>

</body>
</html>
