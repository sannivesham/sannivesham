<!DOCTYPE html>
<html>
<head>
    <title>సన్నివేశం</title>

    <!-- Telugu Font -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Noto Sans Telugu', sans-serif;
            background: linear-gradient(to bottom, #fff7e6, #ffe4c4);
            color: #333;
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .logo {
            width: 130px;
            border-radius: 50%;
            border: 3px solid #ff9933;
            box-shadow: 0 0 15px rgba(255,153,51,0.4);
        }

        .tag {
            margin-top: 15px;
            color: #666;
            font-size: 16px;
        }

        h1 {
            color: #ff6600;
            margin: 8px 0;
            font-size: 34px;
        }

        .about {
            background: #ffffff;
            margin: 20px;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .about p {
            color: #444;
            line-height: 1.8;
            font-size: 16px;
        }

        .event-btn {
            display:inline-block;
            margin-top:15px;
            padding:12px 22px;
            background: #ff9933;
            color:white;
            text-decoration:none;
            border-radius:10px;
            font-weight:bold;
            transition:0.3s;
        }

        .event-btn:hover {
            background: #ff6600;
            transform: scale(1.05);
        }

        .buttons {
            text-align: center;
            margin: 30px 0;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 22px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .insta {
            background: linear-gradient(45deg, #E1306C, #C13584);
        }

        .youtube {
            background: linear-gradient(45deg, #FF0000, #cc0000);
        }

        .btn i {
            margin-right: 8px;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <img src="https://raw.githubusercontent.com/sannivesham/sannivesham/main/Logo%20(2).png" class="logo">

        <div class="tag">తెలుగు 🌸</div>
        <h1>సన్నివేశం</h1>
    </div>

    <!-- ABOUT -->
    <div class="about">
        <p>
            సంస్కృతి • సంప్రదాయం • సంభాషణ <br><br>
            మన సంప్రదాయాల సౌందర్యాన్ని పంచే వేదిక 🌿 <br>
            సృజనాత్మక ఆలోచనలకు ఒక కొత్త దారి ✨
        </p>
    </div>

    <!-- EVENTS -->
    <div class="about">
        <h2>మా కార్యక్రమాలు</h2>
        <a href="events.html" target="_blank" class="event-btn">
            ప్రతిభా వేదిక 🎭
        </a>
    </div>

    <!-- SOCIAL -->
    <div class="buttons">
        <a href="https://www.instagram.com/sannivesham?igsh=NjhiZzBtNHBtd2g1" target="_blank" class="btn insta">
            <i class="fa-brands fa-instagram"></i> Instagram
        </a>

        <a href="https://youtube.com/@sannivesham" target="_blank" class="btn youtube">
            <i class="fa-brands fa-youtube"></i> YouTube
        </a>
    </div>

</body>
</html>
