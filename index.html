<!DOCTYPE html>
<html lang="te">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>సన్నివేశం</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Noto Sans Telugu', sans-serif;
    color:white;
    overflow-x:hidden;
    background:black;
}

/* ================= BACKGROUND ================= */

.bg-image{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-10;
    background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.88)),
    url("https://images.unsplash.com/photo-1518562180175-34a163b1a9a6?q=80&w=1600&auto=format&fit=crop");
    background-size:cover;
    background-position:center;
}

.sky-energy{
    position:fixed;
    width:200%;
    height:200%;
    top:-50%;
    left:-50%;
    z-index:-9;
    background:
    radial-gradient(circle at 20% 30%, rgba(255,140,0,0.10), transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(120,160,255,0.10), transparent 45%),
    radial-gradient(circle at 40% 80%, rgba(255,200,100,0.08), transparent 50%);
    animation:skyMove 25s linear infinite;
}

@keyframes skyMove{
    0%{transform:translate(0,0);}
    50%{transform:translate(-80px,60px);}
    100%{transform:translate(0,0);}
}

/* ================= DIVINE LIGHT ================= */

.divine-light{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-8;
    background:radial-gradient(circle, rgba(255,140,0,0.14), transparent 50%);
    animation:glow 5s infinite;
}

@keyframes glow{
    0%{opacity:0.5;}
    50%{opacity:1;}
    100%{opacity:0.5;}
}

/* ================= PARTICLES ================= */

.floating-particles{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-7;
    background-image:
    radial-gradient(rgba(255,180,80,0.3) 1px, transparent 2px),
    radial-gradient(rgba(255,120,0,0.2) 1px, transparent 2px);
    background-size:120px 120px;
    animation:move 20s linear infinite;
}

@keyframes move{
    from{transform:translateY(0);}
    to{transform:translateY(-250px);}
}

/* ================= INTRO ================= */

#intro{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:black;
    z-index:9999;
    animation:fadeOut 1s ease 4s forwards;
}

.intro-symbol{
    font-size:65px;
    animation:pop 2s infinite alternate;
}

#intro h1{
    font-size:60px;
    background:linear-gradient(270deg,#2b1055,#7597de,#ffb347,#2b1055);
    background-size:600% 600%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:zoom 1.6s forwards, gradient 6s infinite;
    transform:scale(0.4);
    opacity:0;
}

@keyframes zoom{
    to{transform:scale(1);opacity:1;}
}

@keyframes fadeOut{
    to{opacity:0;visibility:hidden;}
}

/* ================= NAV ================= */

.navbar{
    position:sticky;
    top:0;
    z-index:999;
    display:flex;
    justify-content:center;
    gap:20px;
    padding:18px;
    background:rgba(0,0,0,0.7);
}

.navbar a{
    color:#ffd9a3;
    text-decoration:none;
    font-weight:bold;
}

/* ================= HEADER ================= */

.header{
    text-align:center;
    padding:80px 20px 40px;
}

.logo-container{
    width:190px;
    height:190px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:3px solid rgba(255,180,80,0.3);
}

.logo{
    width:100%;
    height:100%;
    object-fit:cover;
}

.title{
    margin-top:35px;
    font-size:72px;
    font-weight:800;
    background:linear-gradient(270deg,#2b1055,#7597de,#ffb347,#2b1055);
    background-size:600% 600%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ================= SECTION ================= */

.section{
    width:92%;
    max-width:950px;
    margin:30px auto;
    padding:35px;
    background:rgba(10,10,10,0.82);
    border-radius:26px;
}

/* ================= GRID ================= */

.grid-box{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* ================= BUTTON ================= */

.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:110px;
    border-radius:20px;
    text-decoration:none;
    font-weight:bold;
    color:white;
    background:linear-gradient(270deg,#2b1055,#7597de,#ffb347,#2b1055);
    background-size:600% 600%;
    animation:gradient 6s infinite;
}

/* ================= ANIMATION ================= */

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ================= MUSIC ================= */

#musicBtn{
    position:fixed;
    top:85px;
    right:18px;
    width:58px;
    height:58px;
    border-radius:50%;
    border:none;
    background:linear-gradient(135deg,#ff9a2f,#ff6a00);
    color:white;
    font-size:24px;
}

</style>
</head>

<body>

<div id="intro">
    <div class="intro-symbol">⚔️</div>
    <h1>సన్నివేశం</h1>
</div>

<div class="bg-image"></div>
<div class="sky-energy"></div>
<div class="divine-light"></div>
<div class="floating-particles"></div>

<div class="navbar">
<a href="#home">ముఖ్యపుట</a>
<a href="#sections">విభాగాలు</a>
<a href="#social">సోషల్</a>
<a href="#about">మా గురించి</a>
<a href="#contact">సంప్రదించండి</a>
</div>

<div class="header" id="home">

<div class="logo-container">
<img src="https://raw.githubusercontent.com/sannivesham/phothos.sannivesham/main/Logo%20(1).png" class="logo">
</div>

<div class="title">సన్నివేశం</div>

</div>

<!-- SOCIAL -->
<div class="section" id="social">
<h2 style="text-align:center;margin-bottom:20px;">మాతో కలవండి</h2>

<div class="grid-box">
<a class="btn" href="#">Instagram</a>
<a class="btn" href="#">YouTube</a>
</div>
</div>

<!-- ABOUT -->
<div class="section" id="about">

<h2 style="text-align:center;margin-bottom:20px;">మా గురించి</h2>

<p style="text-align:center;line-height:2;">
సన్నివేశం ఒక సాంస్కృతిక వేదిక...
</p>

<div style="display:flex;justify-content:center;margin-top:20px;">
<a href="about.html" class="btn" style="min-width:220px;">More About Us</a>
</div>

</div>

<!-- CONTACT -->
<div class="section" id="contact">

<h2 style="text-align:center;margin-bottom:20px;">సంప్రదించండి</h2>

<div class="grid-box">
<a class="btn" href="tel:9493226037">Call</a>
<a class="btn" href="https://wa.me/919493226037">WhatsApp</a>
</div>

</div>

<div style="text-align:center;padding:25px;color:#aaa;">
© 2026 సన్నివేశం
</div>

<audio id="bgMusic" loop>
<source src="https://raw.githubusercontent.com/sannivesham/phothos.sannivesham/main/WhatsApp%20Audio%202026-04-07%20at%2022.41.48%20(1).mpeg">
</audio>

<button id="musicBtn">🔊</button>

<script>

setTimeout(()=>{
document.getElementById("intro").style.display="none";
},4000);

const music=document.getElementById("bgMusic");
const btn=document.getElementById("musicBtn");

music.play().catch(()=>{});

document.body.addEventListener("click",()=>{
music.play();
},{once:true});

btn.onclick=()=>{
if(music.paused){
music.play();
btn.innerHTML="🔊";
}else{
music.pause();
btn.innerHTML="🔇";
}
};

</script>

</body>
</html>
