            padding: 12px;

        .insta { background: #E1306C; }
        .youtube { background: red; }
        .call { background: green; }
        .whatsapp { background: #25D366; }

        /* DESKTOP VIEW */
        @media (min-width: 768px) {

                width: 60%;
                margin: 20px auto;
