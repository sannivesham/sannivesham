<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>సన్నివేశం | మహాభారతం</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Noto Sans Telugu', sans-serif;
    color:white;
    overflow-x:hidden;
    min-height:100vh;
    background:#000;
}

/* =========================
   🔱 INTRO SCREEN
========================= */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:99999;

    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;

    background:
    radial-gradient(circle at center, rgba(255,140,0,0.15), transparent 40%),
    linear-gradient(180deg,#000,#050505,#000);

    animation: fadeOut 1s ease 4s forwards;
}

.intro-content{
    text-align:center;
    color:#ffcc99;
}

.chakra{
    font-size:60px;
    animation: spin 3s linear infinite;
    margin-bottom:10px;
}

#intro h1{
    font-size:38px;
    color:#ffb347;
    letter-spacing:2px;
    text-shadow:0 0 20px rgba(255,140,0,0.4);
}

#intro p{
    margin-top:10px;
    color:#ddd;
}

.loader{
    margin-top:25px;
    width:180px;
    height:4px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
    overflow:hidden;
    position:relative;
}

.loader::before{
    content:"";
    position:absolute;
    width:40%;
    height:100%;
    background:linear-gradient(90deg,#ff9a2f,#ffb347,#ff6a00);
    animation: load 1.5s infinite;
}

/* =========================
   🖼️ BACKGROUND IMAGE
========================= */
.bg-image{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-6;

    background:
    url("https://images.unsplash.com/photo-1520975922284-9a9b7c6d7f0f?auto=format&fit=crop&w=1600&q=80");

    background-size:cover;
    background-position:center;

    filter:brightness(0.35) contrast(1.2);
}

/* 🌑 DARK OVERLAY */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-5;

    background:radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.85) 80%);
}

/* 🔥 EMBERS */
.embers{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-4;

    background-image:
    radial-gradient(circle, rgba(255,140,0,0.35) 1px, transparent 3px),
    radial-gradient(circle, rgba(255,200,120,0.25) 1px, transparent 3px);

    background-size:120px 120px;
    opacity:0.25;

    animation: float 12s linear infinite;
}

/* 🌫️ SMOKE */
.smoke{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-3;

    background-image:
    radial-gradient(rgba(255,255,255,0.05) 2px, transparent 2px);

    background-size:90px 90px;
    opacity:0.12;

    animation: drift 60s linear infinite;
}

/* ⚡ LIGHTNING */
.lightning{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;

    animation: flash 7s infinite;
}

/* =========================
   NAVBAR
========================= */
.navbar{
    position:sticky;
    top:0;
    z-index:999;

    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:18px;

    padding:14px;

    background:rgba(0,0,0,0.75);
    backdrop-filter:blur(10px);

    border-bottom:1px solid rgba(255,180,80,0.2);
}

.navbar a{
    text-decoration:none;
    color:#ffd9a3;
    font-weight:bold;
}

/* HEADER */
.header{
    text-align:center;
    padding:50px 20px;
}

.logo-container{
    width:180px;
    height:180px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;

    border:2px solid rgba(255,180,80,0.4);
    box-shadow:0 0 40px rgba(255,140,0,0.2);
}

.logo{
    width:100%;
    height:100%;
    object-fit:cover;
}

.title{
    margin-top:20px;
    font-size:48px;
    color:#ffb347;
    text-shadow:0 0 20px rgba(255,140,0,0.3);
}

/* SECTION */
.section{
    width:92%;
    max-width:950px;
    margin:30px auto;

    background:rgba(10,10,10,0.85);
    border-radius:20px;
    padding:30px;

    border:1px solid rgba(255,180,80,0.15);
}

/* GRID */
.grid-box{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:18px;
}

/* BUTTONS */
.btn{
    display:flex;
    justify-content:center;
    align-items:center;

    padding:18px;
    min-height:85px;

    border-radius:14px;
    text-decoration:none;

    font-weight:bold;
    color:#fff3dd;

    background:linear-gradient(135deg,#b86b1d,#ff9f2f,#b86b1d);

    transition:0.3s;
}

.btn:hover{
    transform:translateY(-6px) scale(1.03);
}

/* FOOTER */
.footer{
    text-align:center;
    padding:30px;
    color:#aaa;
}

/* =========================
   ANIMATIONS
========================= */
@keyframes load{
    from{left:-40%;}
    to{left:100%;}
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes fadeOut{
    to{opacity:0;visibility:hidden;}
}

@keyframes float{
    from{transform:translateY(0);}
    to{transform:translateY(-200px);}
}

@keyframes drift{
    from{transform:translateY(0);}
    to{transform:translateY(-300px);}
}

@keyframes flash{
    0%,90%,100%{background:transparent;}
    92%{background:rgba(255,255,255,0.08);}
    96%{background:rgba(255,200,120,0.05);}
}

/* MOBILE */
@media(max-width:700px){
    .grid-box{
        grid-template-columns:1fr;
    }

    .title{
        font-size:38px;
    }
}

</style>
</head>

<body>

<!-- NAV -->

<!-- SECTIONS -->

<div class="footer">

</body>
