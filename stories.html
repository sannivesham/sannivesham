<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>గ్రంథాలయం - సన్నివేశం</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Scoped fix for this page only - does not touch style.css */
    .stories-page {
      padding-top: 20px !important;
      margin-top: 0 !important;
    }
    .stories-page .stories-title-box {
      margin-top: 10px !important;
      margin-bottom: 25px !important;
    }

    /* Bigger category cards on mobile only - desktop untouched. Still 2 per row. */
    @media (max-width: 700px) {
      #storiesGrid.stories-grid {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 14px !important;
      }
      #storiesGrid .story-card {
        width: 100% !important;
      }
      #storiesGrid .story-card img {
        width: 100% !important;
        height: auto !important;
        aspect-ratio: 3 / 4 !important;
        object-fit: cover !important;
      }
      #storiesGrid .story-name {
        font-size: 1.05rem !important;
        padding: 10px !important;
      }
    }
  </style>
</head>
<body class="stories-body">
  <div class="stories-bg"></div>
  <div id="loader">
    <div class="loader-content">
      <img src="images/logo.png" class="loader-logo" alt="Sannivesham Logo">
      <h1>సన్నివేశం</h1>
      <div class="loader-line"></div>
    </div>
  </div>
  <nav class="glass-navbar">
    <a href="index.html#categories">← వెనుకకు</a>
    <a href="index.html">ప్రారంభం</a>
    <a href="stories.html">గ్రంథాలయం</a>
  </nav>
  <section class="stories-page">
    <div class="stories-title-box">
      <h1>గ్రంథాలయం</h1>
      <p>స్తోత్రాలు, సహస్రనామాలు మరియు ఆధ్యాత్మిక గ్రంథాల సమాహారం</p>
    </div>
<div class="stories-grid" id="storiesGrid"></div>
  </section>
  <footer class="simple-footer">
    <p class="footer-quote">✨ గ్రంథాలయం మన సంస్కృతికి జ్ఞాన నిధి ✨</p>
<script type="module" src="social-links.js"></script>    <p>© 2026 సన్నివేశం</p>
  </footer>
  <script src="script.js?v=2"></script>
  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      doc,
      getDoc,
      getDocFromServer
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
    async function loadStoriesBackground() {
      let snap;
      try {
        snap = await getDocFromServer(doc(db, "settings", "backgrounds"));
      } catch (e) {
        snap = await getDoc(doc(db, "settings", "backgrounds"));
      }
      if (!snap.exists()) return;
      const data = snap.data();
      const bg = document.querySelector(".stories-bg");
      if (!bg) return;
      if (window.innerWidth <= 700 && data.storiesMobile) {
        bg.style.backgroundImage =
          `linear-gradient(rgba(10,5,0,0.60),
        rgba(10,5,0,0.65)),
        url("${data.storiesMobile}")`;
      } else if (data.storiesPc) {
        bg.style.backgroundImage =
          `linear-gradient(rgba(10,5,0,0.65),
        rgba(10,5,0,0.70)),
        url("${data.storiesPc}")`;
      }
    }
    loadStoriesBackground();
  </script>
  <script type="module" src="stories.js?v=2"></script>
  <audio id="bgMusic" loop>
  <source src="music/traditional.mp3" type="audio/mpeg">
</audio>
<button id="musicBtn" class="music-btn">
  🔊
</button>
<script src="music.js?v=2"></script>
</body>
</html>
