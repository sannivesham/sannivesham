<!DOCTYPE html>
<html>
<head>
    <title>సన్నివేశం</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu&display=swap" rel="stylesheet">

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            overflow:hidden;
            font-family:'Noto Sans Telugu', sans-serif;
            background:linear-gradient(135deg,#050505,#111,#1a1a1a);
            color:white;
            text-align:center;
        }

        /* Background Texture */

        body::before{
            content:"";
            position:absolute;
            width:100%;
            height:100%;
            background-image:
            radial-gradient(circle at 20% 20%, rgba(255,140,0,0.12) 2px, transparent 2px),
            radial-gradient(circle at 80% 60%, rgba(255,140,0,0.10) 2px, transparent 2px),
            radial-gradient(circle at 40% 80%, rgba(255,140,0,0.08) 2px, transparent 2px);
            background-size:120px 120px;
            z-index:-1;
        }

        /* Main Box */

        .box{
            background:rgba(20,20,20,0.92);
            padding:40px 25px;
            border-radius:22px;
            border:1px solid rgba(255,153,51,0.15);
            box-shadow:0 8px 25px rgba(0,0,0,0.45);
            width:85%;
            max-width:500px;
            animation:fadeUp 1s ease;
        }

        /* Title */

        h1{
            font-size:42px;
            color:#ff9933;
            margin:0;
            animation:glow 2s infinite alternate;
        }

        /* Subtitle */

        p{
            margin-top:15px;
            font-size:18px;
            color:#ddd;
            line-height:1.7;
        }

        /* Button */

        .btn{
            display:inline-block;
            margin-top:25px;
            padding:14px 28px;
            background:linear-gradient(135deg,#ff8c00,#ff6600);
            color:white;
            text-decoration:none;
            border-radius:14px;
            transition:0.3s;
            font-weight:bold;
        }

        .btn:hover{
            transform:scale(1.05);
        }

        /* Animations */

        @keyframes glow{
            from{
                text-shadow:0 0 10px rgba(255,153,51,0.4);
            }

            to{
                text-shadow:0 0 25px rgba(255,153,51,0.9);
            }
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>త్వరలో వస్తుంది 🚀</h1>

        <p>
            ఈ విభాగం ప్రస్తుతం నిర్మాణంలో ఉంది ✨
            <br><br>
            త్వరలో మరిన్ని ఆసక్తికర విషయాలతో మీ ముందుకు వస్తాము.
        </p>

        <a href="index.html" class="btn">
            ⬅ తిరిగి వెళ్ళండి
        </a>

    </div>

</body>
</html>
