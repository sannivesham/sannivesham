*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Noto Sans Telugu', sans-serif;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

color:white;

background-position:center;

position:relative;
}

/* Floating particles */

body::before{

content:"";

position:absolute;

width:100%;
height:100%;

background-image:
radial-gradient(circle, rgba(255,140,0,0.7) 1px, transparent 1px);

background-size:90px 90px;

opacity:0.25;

animation:moveParticles 18s linear infinite;
}

@keyframes moveParticles{

from{
transform:translateY(0px);
}

to{
transform:translateY(-120px);
}
}

/* Main Box */

.container{

width:92%;
max-width:500px;

background:rgba(0,0,0,0.72);

border:1px solid rgba(255,140,0,0.25);

border-radius:30px;

padding:35px 25px;

backdrop-filter:blur(8px);

box-shadow:
0 0 40px rgba(255,140,0,0.15);

position:relative;

z-index:10;
}

/* Heading */

h1{

text-align:center;

font-size:42px;

color:#ffb347;

margin-bottom:15px;

text-shadow:
0 0 20px rgba(255,140,0,0.5);
}

p{

text-align:center;

color:#ddd;

margin-bottom:30px;

font-size:18px;
}

/* Input */

input{

width:100%;

padding:18px;

border:none;

outline:none;

border-radius:18px;

background:#1a1a1a;

color:white;

font-size:18px;

margin-bottom:25px;
}

/* Buttons */

button{

width:100%;

padding:18px;

border:none;

border-radius:20px;

background:
linear-gradient(135deg,#ffb347,#ff8c00);

color:white;

font-size:22px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

margin-top:10px;
}

button:hover{

transform:scale(1.03);
}

/* Quiz */

#quizBox{

display:none;
}

/* Question */

.question{

font-size:24px;

margin-bottom:25px;

line-height:1.7;
}

/* Options */

.option{

background:#1b1b1b;

padding:18px;

border-radius:18px;

margin-bottom:15px;

cursor:pointer;

transition:0.3s;

border:1px solid rgba(255,140,0,0.15);
}

.option:hover{

transform:translateX(5px);

background:#262626;
}

/* Correct */

.correct{

background:green !important;
}

/* Wrong */

.wrong{

background:red !important;
}

/* Score */

#scoreBox{

display:none;

text-align:center;
}

#scoreBox h2{

font-size:40px;

color:#ffb347;

margin-bottom:20px;
}

/* Leaderboard */

.leaderboardPopup{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.85);

display:none;

justify-content:center;
align-items:center;

z-index:99999;
}

width:90%;
max-width:400px;

background:#111;

border:2px solid #ff9933;

border-radius:25px;

padding:25px;

box-shadow:
0 0 40px rgba(255,140,0,0.4);

text-align:center;
}

.leaderboardBox h2{

color:#ffb347;

margin-bottom:20px;
}

background:#1b1b1b;

margin:10px 0;

padding:15px;

border-radius:15px;

</div>

</div>

let selectedQuestions = [];

let currentQuestion = 0;

let score = 0;

let username = "";

/* Start Quiz */

window.startQuiz = function(){

username =
document.getElementById("username").value;

if(username.trim() === ""){

alert("పేరు నమోదు చేయండి");

return;
}

document.getElementById("startScreen").style.display="none";

document.getElementById("quizBox").style.display="block";

selectedQuestions =
questions.sort(()=>0.5 - Math.random()).slice(0,5);

showQuestion();
}

/* Show Question */

function showQuestion(){

const q = selectedQuestions[currentQuestion];

document.getElementById("question").innerHTML =
`${currentQuestion+1}. ${q.q}`;

const optionsDiv =
document.getElementById("options");

optionsDiv.innerHTML = "";

q.o.forEach(option=>{

const div =
document.createElement("div");

div.classList.add("option");

div.innerHTML = option;

div.onclick = ()=>checkAnswer(div, option);

optionsDiv.appendChild(div);
});
}

/* Check Answer */

function checkAnswer(element, selected){

const correct =
selectedQuestions[currentQuestion].a;

const allOptions =
document.querySelectorAll(".option");

allOptions.forEach(opt=>{

opt.style.pointerEvents="none";

if(opt.innerHTML === correct){

opt.classList.add("correct");
}

if(opt.innerHTML === selected &&
selected !== correct){

opt.classList.add("wrong");
}
});

if(selected === correct){

score++;
}

setTimeout(()=>{

currentQuestion++;

if(currentQuestion < selectedQuestions.length){

showQuestion();

}else{

finishQuiz();
}

},1200);
}

/* Finish Quiz */

async function finishQuiz(){

document.getElementById("quizBox").style.display="none";

document.getElementById("scoreBox").style.display="block";

document.getElementById("finalScore").innerHTML =
`${username} గారి స్కోర్ : ${score}/5 🔥`;

await addDoc(collection(db,"leaderboard"),{

name:username,
score:score
});
}

/* Leaderboard */

window.openLeaderboard = async function(){

document.getElementById("leaderboardPopup").style.display="flex";

const leaderboardList =
document.getElementById("leaderboardList");

leaderboardList.innerHTML="Loading...";

const q =
query(
collection(db,"leaderboard"),
orderBy("score","desc"),
limit(10)
);

const querySnapshot =
await getDocs(q);

leaderboardList.innerHTML="";

let rank = 1;

querySnapshot.forEach((doc)=>{

const data = doc.data();

leaderboardList.innerHTML += `

<div class="player">

<span>${rank}. ${data.name}</span>

<span>${data.score}/5</span>

</div>

`;

rank++;
});
}

window.closeLeaderboard = function(){

document.getElementById("leaderboardPopup").style.display="none";
}
