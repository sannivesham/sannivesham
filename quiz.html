let selectedQuestions=[], currentQuestion=0, score=0;
let username="", selectedLevel="", questionLimit=0, selectedOption=null;

/* LEVEL */
window.selectLevel=function(level,count,el){
selectedLevel=level;
questionLimit=count;
document.querySelectorAll(".levelBtn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

/* START */
window.startQuiz=function(){
username=document.getElementById("username").value;
if(!username||!selectedLevel){
alert("పేరు & స్థాయి ఎంచుకోండి");
return;
}

document.getElementById("startScreen").style.display="none";
document.getElementById("quizBox").style.display="block";

let pool =
selectedLevel==="easy"?easyQuestions:
selectedLevel==="medium"?mediumQuestions:
hardQuestions;

selectedQuestions = pool.sort(()=>0.5-Math.random()).slice(0,questionLimit);

showQuestion();
}

function showQuestion(){
selectedOption=null;

const q=selectedQuestions[currentQuestion];

document.getElementById("question").innerText =
`${currentQuestion+1}. ${q.q}`;

const options=document.getElementById("options");
options.innerHTML="";

q.o.forEach(op=>{
const div=document.createElement("div");
div.className="option";
div.innerText=op;

div.onclick=()=>{
document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
div.classList.add("selected");
selectedOption=op;
};

options.appendChild(div);
});
}

window.submitAnswer=function(){

if(!selectedOption){
alert("ఒక సమాధానం ఎంచుకోండి");
return;
}

if(selectedOption===selectedQuestions[currentQuestion].a){
score++;
}

currentQuestion++;

if(currentQuestion<selectedQuestions.length){
showQuestion();
}else{
finishQuiz();
}
}

/* FINISH */
async function finishQuiz(){

document.getElementById("quizBox").style.display="none";
document.getElementById("scoreBox").style.display="block";

document.getElementById("finalScore").innerText=
`${username} స్కోర్: ${score}/${questionLimit}`;

await addDoc(collection(db,selectedLevel+"_leaderboard"),{
name:username,
score:score
});

loadBoards();
}

/* 🔥 3 LEADERBOARDS */
async function loadBoard(level,id){

const box=document.getElementById(id);
box.innerHTML="Loading...";

const q=query(
collection(db,level+"_leaderboard"),
orderBy("score","desc"),
limit(10)
);

const snap=await getDocs(q);

box.innerHTML="";
let r=1;

snap.forEach(doc=>{
const d=doc.data();

box.innerHTML+=`
<div class="lbPlayer">
<span class="rank">${r}. ${d.name}</span>
<span class="score">${d.score}</span>
</div>
`;
r++;
});
}

async function loadBoards(){
loadBoard("easy","easyList");
loadBoard("medium","mediumList");
loadBoard("hard","hardList");
}

loadBoards();

</script>
