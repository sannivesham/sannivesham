<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy,
limit

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyAr2dGcs3uPgmDMLCaMI8_e3c5kasf7RYY",

authDomain: "sannivesham-quiz.firebaseapp.com",

projectId: "sannivesham-quiz",

storageBucket: "sannivesham-quiz.firebasestorage.app",

messagingSenderId: "726198930572",

appId: "1:726198930572:web:298f21668e5e9636c6bfa9"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* QUESTIONS */

const questions = [

{
question:"శ్రీరాముడి తండ్రి పేరు ఏమిటి?",
options:["దశరథుడు","జనకుడు","భీష్ముడు","పాండు"],
answer:"దశరథుడు"
},

{
question:"శ్రీరాముడి జన్మస్థలం ఏది?",
options:["ద్వారక","మథుర","అయోధ్య","హస్తినాపురం"],
answer:"అయోధ్య"
},

{
question:"హనుమంతుడు ఏ దేవుని అవతారంగా భావిస్తారు?",
options:["శివుడు","వాయుదేవుడు","విష్ణువు","ఇంద్రుడు"],
answer:"వాయుదేవుడు"
},

{
question:"శ్రీరాముడి భార్య ఎవరు?",
options:["ద్రౌపది","రుక్మిణి","సీతాదేవి","సత్యభామ"],
answer:"సీతాదేవి"
},

{
question:"లక్ష్మణుడి తల్లి పేరు ఏమిటి?",
options:["కౌసల్య","కైకేయి","సుమిత్ర","గాంధారి"],
answer:"సుమిత్ర"
},

{
question:"మహాభారతంలో పాండవులు మొత్తం ఎంతమంది?",
options:["3","5","7","10"],
answer:"5"
},

{
question:"అర్జునుడికి గీతను ఎవరు బోధించారు?",
options:["వ్యాసుడు","కర్ణుడు","శ్రీకృష్ణుడు","భీష్ముడు"],
answer:"శ్రీకృష్ణుడు"
},

{
question:"కౌరవుల పెద్దవాడు ఎవరు?",
options:["దుశ్శాసనుడు","దుర్యోధనుడు","వికర్ణుడు","అశ్వత్థామ"],
answer:"దుర్యోధనుడు"
},

{
question:"భీముడి బలం ఏ విషయంలో ప్రసిద్ధి?",
options:["విలువిద్య","గదాయుద్ధం","సంగీతం","గుర్రపు స్వారీ"],
answer:"గదాయుద్ధం"
},

{
question:"అభిమన్యుడు ఎవరి కుమారుడు?",
options:["భీముడు","యుధిష్ఠిరుడు","అర్జునుడు","కర్ణుడు"],
answer:"అర్జునుడు"
},

{
question:"లంక దహనం చేసినవాడు ఎవరు?",
options:["అంగదుడు","హనుమంతుడు","సుగ్రీవుడు","జాంబవంతుడు"],
answer:"హనుమంతుడు"
},

{
question:"గీత బోధ జరిగిన యుద్ధభూమి పేరు ఏమిటి?",
options:["పంచవటి","అయోధ్య","కురుక్షేత్రం","ద్వారక"],
answer:"కురుక్షేత్రం"
}

];

/* VARIABLES */

let selectedQuestions = [];

let currentQuestion = 0;

let score = 0;

let player = "";

/* START QUIZ */

window.startQuiz = function(){

player = document.getElementById("playerName").value;

if(player.trim() === ""){

alert("దయచేసి మీ పేరు నమోదు చేయండి");

return;
}

selectedQuestions = [...questions]
.sort(()=>0.5 - Math.random())
.slice(0,5);

document.getElementById("startBox").style.display="none";

document.getElementById("quizBox").style.display="block";

loadQuestion();

}

/* LOAD QUESTION */

function loadQuestion(){

const q = selectedQuestions[currentQuestion];

document.getElementById("questionNumber").innerHTML =
`ప్రశ్న ${currentQuestion+1} / 5`;

document.getElementById("questionText").innerHTML =
q.question;

document.getElementById("liveScore").innerHTML =
`స్కోర్ : ${score}`;

let optionsHTML = "";

q.options.forEach(option=>{

optionsHTML += `

<div class="option"

onclick="checkAnswer(this,'${option}')">

${option}

</div>

`;

});

document.getElementById("optionsBox").innerHTML =
optionsHTML;

}

/* CHECK ANSWER */

window.checkAnswer = function(element,selected){

const correct =
selectedQuestions[currentQuestion].answer;

const allOptions =
document.querySelectorAll(".option");

/* DISABLE MULTIPLE CLICKS */

allOptions.forEach(opt=>{

opt.style.pointerEvents = "none";

});

/* CORRECT */

if(selected === correct){

score++;

element.style.background = "#1f8b24";

element.style.border =
"2px solid #4dff57";

}

/* WRONG */

else{

element.style.background = "#8b1f1f";

element.style.border =
"2px solid red";

/* SHOW CORRECT */

allOptions.forEach(opt=>{

if(opt.innerText === correct){

opt.style.background = "#1f8b24";

opt.style.border =
"2px solid #4dff57";

}

});

}

/* UPDATE SCORE */

document.getElementById("liveScore").innerHTML =
`స్కోర్ : ${score}`;

/* NEXT QUESTION */

setTimeout(()=>{

currentQuestion++;

if(currentQuestion < 5){

loadQuestion();

}else{

showResult();

}

},1200);

}

/* RESULT */

async function showResult(){

document.getElementById("quizBox").style.display="none";

document.getElementById("resultBox").style.display="block";

document.getElementById("scoreText").innerHTML =
`${player} — ${score}/5`;

/* SAVE ONLINE */

await addDoc(collection(db, "leaderboard"), {

name: player,

score: score,

time: Date.now()

});

/* LOAD LEADERBOARD */

loadLeaderboard();

}

/* LEADERBOARD */

async function loadLeaderboard(){

const q = query(

collection(db, "leaderboard"),

orderBy("score","desc"),

limit(10)

);

const querySnapshot = await getDocs(q);

let html = "";

let rank = 1;

querySnapshot.forEach((doc)=>{

const data = doc.data();

html += `

<div class="rank">

🏆 ${rank}. ${data.name}
— ${data.score}/5

</div>

`;

rank++;

});

document.getElementById("leaderboardList").innerHTML =
html;

}

/* RESTART */

window.restartQuiz = function(){

location.reload();

}

</script>
