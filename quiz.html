<!DOCTYPE html>
<html lang="te">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ధర్మ పరీక్ష ⚔️</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Noto Sans Telugu', sans-serif;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow-x:hidden;

color:white;

background:
linear-gradient(rgba(0,0,0,0.78),rgba(0,0,0,0.88)),
url('https://images.unsplash.com/photo-1518562180175-34a163b1a9a6?q=80&w=1400&auto=format&fit=crop');

background-size:cover;
background-position:center;

position:relative;
padding:30px 0;
}

/* FLOATING PARTICLES */

body::before{

content:"";

position:absolute;

width:100%;
height:100%;

background-image:
radial-gradient(circle, rgba(255,140,0,0.8) 1px, transparent 1px);

background-size:90px 90px;

opacity:0.22;

animation:moveParticles 18s linear infinite;
}

@keyframes moveParticles{

from{
transform:translateY(0px);
}

to{
transform:translateY(-120px);
}
}

/* MAIN BOX */

.container{

width:92%;
max-width:520px;

background:rgba(0,0,0,0.72);

border:1px solid rgba(255,140,0,0.25);

border-radius:30px;

padding:35px 25px;

backdrop-filter:blur(8px);

box-shadow:
0 0 40px rgba(255,140,0,0.15);

position:relative;

z-index:10;
}

/* HEADING */

h1{

text-align:center;

font-size:42px;

color:#ffb347;

margin-bottom:15px;

text-shadow:
0 0 20px rgba(255,140,0,0.5);
}

p{

text-align:center;

color:#ddd;

margin-bottom:30px;

font-size:18px;
}

/* INPUT */

input{

width:100%;

padding:18px;

border:none;

outline:none;

border-radius:18px;

background:#1a1a1a;

color:white;

font-size:18px;

margin-bottom:25px;
}

/* BUTTON */

button{

width:100%;

padding:18px;

border:none;

border-radius:20px;

background:
linear-gradient(135deg,#ffb347,#ff8c00);

color:white;

font-size:22px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

margin-top:10px;
}

button:hover{

transform:scale(1.03);
}

/* QUIZ */

#quizBox{

display:none;
}

/* QUESTION */

.question{

font-size:24px;

margin-bottom:25px;

line-height:1.7;
}

/* OPTIONS */

.option{

background:#1b1b1b;

padding:18px;

border-radius:18px;

margin-bottom:15px;

cursor:pointer;

transition:0.3s;

border:1px solid rgba(255,140,0,0.15);

font-size:18px;
}

.option:hover{

transform:translateX(5px);

background:#262626;
}

/* CORRECT */

.correct{

background:green !important;
}

/* WRONG */

.wrong{

background:red !important;
}

/* SCORE */

#scoreBox{

display:none;

text-align:center;
}

#scoreBox h2{

font-size:40px;

color:#ffb347;

margin-bottom:20px;
}

/* LIVE LEADERBOARD */

.liveLeaderboard{

margin-top:35px;

background:#111;

border:1px solid rgba(255,140,0,0.25);

border-radius:22px;

padding:20px;

box-shadow:
0 0 25px rgba(255,140,0,0.15);
}

.liveLeaderboard h2{

text-align:center;

color:#ffb347;

margin-bottom:20px;

font-size:28px;
}

.loading{

text-align:center;

color:#aaa;

padding:20px;
}

.player{

background:#1b1b1b;

margin:12px 0;

padding:15px;

border-radius:15px;

display:flex;

justify-content:space-between;

align-items:center;

font-size:18px;

border:1px solid rgba(255,140,0,0.15);

transition:0.3s;
}

.player:hover{

transform:scale(1.02);

background:#222;
}

.rank{

color:#ffb347;
font-weight:bold;
}

.score{

color:#00ff99;
font-weight:bold;
}

@media(max-width:600px){

h1{
font-size:34px;
}

.question{
font-size:21px;
}

button{
font-size:20px;
}

.option{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="container">

<!-- START SCREEN -->

<div id="startScreen">

<h1>ధర్మ పరీక్ష ⚔️</h1>

<p>మీ జ్ఞానాన్ని పరీక్షించుకోండి</p>

<input type="text" id="username" placeholder="మీ పేరు నమోదు చేయండి">

<button onclick="startQuiz()">
పరీక్ష ప్రారంభించండి 🚩
</button>

<!-- LIVE LEADERBOARD -->

<div class="liveLeaderboard">

<h2>🏆 విజేతల పట్టిక</h2>

<div id="leaderboardList">

<div class="loading">
Loading...
</div>

</div>

</div>

</div>

<!-- QUIZ -->

<div id="quizBox">

<div class="question" id="question"></div>

<div id="options"></div>

</div>

<!-- SCORE -->

<div id="scoreBox">

<h2>🎉 పరీక్ష ముగిసింది</h2>

<p id="finalScore"></p>

<button onclick="location.reload()">
మళ్లీ ప్రారంభించండి
</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy,
limit
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyAr2dGcs3uPgmDMLCaMI8_e3c5kasf7RYY",

authDomain: "sannivesham-quiz.firebaseapp.com",

projectId: "sannivesham-quiz",

storageBucket: "sannivesham-quiz.firebasestorage.app",

messagingSenderId: "726198930572",

appId: "1:726198930572:web:298f21668e5e9636c6bfa9"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* QUESTIONS */

const questions = [ 


  {
q:"శ్రీరాముడి తండ్రి పేరు ఏమిటి?",
o:["దశరథుడు","జనకుడు","భీష్ముడు","పాండు"],
a:"దశరథుడు"
},

{
q:"శ్రీరాముడి జన్మస్థలం ఏది?",
o:["ద్వారక","మథుర","అయోధ్య","హస్తినాపురం"],
a:"అయోధ్య"
},

{
q:"శ్రీరాముడి భార్య ఎవరు?",
o:["ద్రౌపది","రుక్మిణి","సీతాదేవి","సత్యభామ"],
a:"సీతాదేవి"
},

{
q:"లక్ష్మణుడి తల్లి పేరు ఏమిటి?",
o:["కౌసల్య","కైకేయి","సుమిత్ర","గాంధారి"],
a:"సుమిత్ర"
},

{
q:"మహాభారతంలో పాండవులు మొత్తం ఎంతమంది?",
o:["3","5","7","10"],
a:"5"
},

{
q:"అర్జునుడికి గీతను ఎవరు బోధించారు?",
o:["వ్యాసుడు","కర్ణుడు","శ్రీకృష్ణుడు","భీష్ముడు"],
a:"శ్రీకృష్ణుడు"
},

{
q:"హనుమంతుడి తల్లి పేరు ఏమిటి?",
o:["అంజనా దేవి","కౌసల్య","సుమిత్ర","తార"],
a:"అంజనా దేవి"
},

{
q:"గీత బోధ జరిగిన యుద్ధభూమి పేరు ఏమిటి?",
o:["పంచవటి","అయోధ్య","కురుక్షేత్రం","ద్వారక"],
a:"కురుక్షేత్రం"
},

{
q:"భగవద్గీతలో ఎన్ని అధ్యాయాలు ఉన్నాయి?",
o:["12","15","18","24"],
a:"18"
},

{
q:"రామాయణాన్ని రచించిన మహర్షి ఎవరు?",
o:["వ్యాసుడు","వాల్మీకి","విశ్వామిత్రుడు","వశిష్ఠుడు"],
a:"వాల్మీకి"
}

];

let selectedQuestions = [];

let currentQuestion = 0;

let score = 0;

let username = "";

/* LOAD LEADERBOARD */

loadLeaderboard();

/* START QUIZ */

window.startQuiz = function(){

username =
document.getElementById("username").value;

if(username.trim() === ""){

alert("పేరు నమోదు చేయండి");

return;
}

document.getElementById("startScreen").style.display="none";

document.getElementById("quizBox").style.display="block";

selectedQuestions =
questions
.sort(()=>0.5 - Math.random())
.slice(0,5);

showQuestion();
}

/* SHOW QUESTION */

function showQuestion(){

const q =
selectedQuestions[currentQuestion];

document.getElementById("question").innerHTML =
`${currentQuestion+1}. ${q.q}`;

const optionsDiv =
document.getElementById("options");

optionsDiv.innerHTML = "";

q.o.forEach(option=>{

const div =
document.createElement("div");

div.classList.add("option");

div.innerHTML = option;

div.onclick = ()=>checkAnswer(div,option);

optionsDiv.appendChild(div);

});
}

/* CHECK ANSWER */

function checkAnswer(element,selected){

const correct =
selectedQuestions[currentQuestion].a;

const allOptions =
document.querySelectorAll(".option");

allOptions.forEach(opt=>{

opt.style.pointerEvents="none";

if(opt.innerHTML === correct){

opt.classList.add("correct");
}

if(
opt.innerHTML === selected &&
selected !== correct
){

opt.classList.add("wrong");
}

});

if(selected === correct){

score++;
}

setTimeout(()=>{

currentQuestion++;

if(currentQuestion < selectedQuestions.length){

showQuestion();

}else{

finishQuiz();
}

},1200);
}

/* FINISH QUIZ */

async function finishQuiz(){

document.getElementById("quizBox").style.display="none";

document.getElementById("scoreBox").style.display="block";

document.getElementById("finalScore").innerHTML =
`${username} గారి స్కోర్ : ${score}/5 🔥`;

await addDoc(
collection(db,"leaderboard"),
{
name:username,
score:score
}
);

loadLeaderboard();
}

/* LOAD LEADERBOARD */

async function loadLeaderboard(){

const leaderboardList =
document.getElementById("leaderboardList");

leaderboardList.innerHTML =
"<div class='loading'>Loading...</div>";

const q =
query(
collection(db,"leaderboard"),
orderBy("score","desc"),
limit(10)
);

const querySnapshot =
await getDocs(q);

leaderboardList.innerHTML = "";

let rank = 1;

querySnapshot.forEach((doc)=>{

const data = doc.data();

leaderboardList.innerHTML += `

<div class="player">

<span class="rank">
${rank}. ${data.name}
</span>

<span class="score">
${data.score}/5
</span>

</div>

`;

rank++;

});
}

</script>

</body>
</html>
