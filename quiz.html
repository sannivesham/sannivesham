<!DOCTYPE html>
<html lang="te">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ధర్మ పరీక్ష ⚔️</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Noto Sans Telugu', sans-serif;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow-x:hidden;

color:white;

background:
linear-gradient(rgba(0,0,0,0.78),rgba(0,0,0,0.88)),
url('https://images.unsplash.com/photo-1518562180175-34a163b1a9a6?q=80&w=1400&auto=format&fit=crop');

background-size:cover;
background-position:center;

position:relative;
padding:30px 0;
}

/* FLOATING PARTICLES */

body::before{

content:"";

position:absolute;

width:100%;
height:100%;

background-image:
radial-gradient(circle, rgba(255,140,0,0.8) 1px, transparent 1px);

background-size:90px 90px;

opacity:0.22;

animation:moveParticles 18s linear infinite;
}

@keyframes moveParticles{

from{
transform:translateY(0px);
}

to{
transform:translateY(-120px);
}
}

/* MAIN BOX */

.container{

width:92%;
max-width:650px;

background:rgba(0,0,0,0.72);

border:1px solid rgba(255,140,0,0.25);

border-radius:30px;

padding:35px 25px;

backdrop-filter:blur(8px);

box-shadow:
0 0 40px rgba(255,140,0,0.15);

position:relative;

z-index:10;
}

/* HEADING */

h1{

text-align:center;

font-size:42px;

color:#ffb347;

margin-bottom:15px;

text-shadow:
0 0 20px rgba(255,140,0,0.5);
}

p{

text-align:center;

color:#ddd;

margin-bottom:25px;

font-size:18px;
}

/* INPUT */

input{

width:100%;

padding:18px;

border:none;

outline:none;

border-radius:18px;

background:#1a1a1a;

color:white;

font-size:18px;

margin-bottom:20px;
}

/* LEVEL BUTTONS */

.levels{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:25px;
}

.levelBtn{

padding:15px;

border:none;

border-radius:18px;

background:#1a1a1a;

color:white;

font-size:18px;

cursor:pointer;

transition:0.3s;

border:2px solid transparent;
}

.levelBtn:hover{

transform:scale(1.03);
}

.levelBtn.active{

border:2px solid #ffb347;

background:#2a1b00;
}

/* BUTTON */

button{

width:100%;

padding:18px;

border:none;

border-radius:20px;

background:
linear-gradient(135deg,#ffb347,#ff8c00);

color:white;

font-size:22px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

margin-top:15px;
}

button:hover{

transform:scale(1.03);
}

/* QUIZ */

#quizBox{

display:none;
}

/* QUESTION */

.question{

font-size:24px;

margin-bottom:25px;

line-height:1.8;
}

/* OPTIONS */

.option{

background:#1b1b1b;

padding:18px;

border-radius:18px;

margin-bottom:15px;

cursor:pointer;

transition:0.3s;

border:1px solid rgba(255,140,0,0.15);

font-size:18px;
}

.option:hover{

transform:translateX(5px);

background:#262626;
}

.option.selected{

border:2px solid #ffb347;
background:#2a1b00;
}

/* CORRECT */

.correct{

background:green !important;
}

/* WRONG */

.wrong{

background:red !important;
}

/* RESULT */

.resultText{

text-align:center;

margin-top:15px;

font-size:20px;

font-weight:bold;
}

/* SCORE */

#scoreBox{

display:none;

text-align:center;
}

#scoreBox h2{

font-size:40px;

color:#ffb347;

margin-bottom:20px;
}

/* LEADERBOARD */

.liveLeaderboard{

margin-top:35px;

background:#111;

border:1px solid rgba(255,140,0,0.25);

border-radius:22px;

padding:20px;

box-shadow:
0 0 25px rgba(255,140,0,0.15);
}

.liveLeaderboard h2{

text-align:center;

color:#ffb347;

margin-bottom:20px;

font-size:28px;
}

.player{

background:#1b1b1b;

margin:12px 0;

padding:15px;

border-radius:15px;

display:flex;

justify-content:space-between;

align-items:center;

font-size:18px;

border:1px solid rgba(255,140,0,0.15);
}

.rank{

color:#ffb347;
font-weight:bold;
}

.score{

color:#00ff99;
font-weight:bold;
}

.loading{

text-align:center;
padding:20px;
color:#aaa;
}

@media(max-width:600px){

h1{
font-size:34px;
}

.question{
font-size:20px;
}

.option{
font-size:16px;
}

.levels{
grid-template-columns:1fr;
}

}

</style>

</head>

</div>

</div>

</div>

<div class="resultText" id="resultText"></div>

<div id="scoreBox">

</div>

</div>

o:["2","9","12","15"],

},

{

},

{

o:["ధనం ఉన్నవాడికి జ్ఞానం","శ్రద్ధ ఉన్నవాడికి జ్ఞానం","వృద్ధులకు మాత్రమే జ్ఞానం","గురువు లేకుండానే జ్ఞానం"],

/* HARD */

const hardQuestions = [

{
q:"రావణుడు రచించిన ప్రసిద్ధ స్తోత్రం ఏది?",

let selectedQuestions = [];
let currentQuestion = 0;
let score = 0;
let username = "";
let selectedLevel = "";
let questionLimit = 0;
let selectedOption = null;

/* SELECT LEVEL */

window.selectLevel = function(level,count,element){

selectedLevel = level;
questionLimit = count;

document.querySelectorAll(".levelBtn")
.forEach(btn=>btn.classList.remove("active"));

element.classList.add("active");

loadLeaderboard();
}

/* START */

window.startQuiz = function(){

username =
document.getElementById("username").value;

if(username.trim() === ""){

alert("పేరు నమోదు చేయండి");
return;
}

if(selectedLevel === ""){

alert("ఒక స్థాయిని ఎంచుకోండి");
return;
}

document.getElementById("startScreen").style.display="none";

document.getElementById("quizBox").style.display="block";

let questionPool = [];

if(selectedLevel === "easy"){
questionPool = easyQuestions;
}

if(selectedLevel === "medium"){
questionPool = mediumQuestions;
}

if(selectedLevel === "hard"){
questionPool = hardQuestions;
}

selectedQuestions =
questionPool
.sort(()=>0.5 - Math.random())
.slice(0,questionLimit);

showQuestion();
}

/* SHOW QUESTION */

function showQuestion(){

selectedOption = null;

document.getElementById("resultText").innerHTML = "";

const q = selectedQuestions[currentQuestion];

document.getElementById("question").innerHTML =
`${currentQuestion+1}. ${q.q}`;

const optionsDiv =
document.getElementById("options");

optionsDiv.innerHTML = "";

q.o.forEach(option=>{

const div =
document.createElement("div");

div.classList.add("option");

div.innerHTML = option;

div.onclick = ()=>{

document.querySelectorAll(".option")
.forEach(opt=>opt.classList.remove("selected"));

div.classList.add("selected");

selectedOption = option;
};

optionsDiv.appendChild(div);

});
}

/* SUBMIT */

window.submitAnswer = function(){

if(selectedOption === null){

alert("ఒక సమాధానం ఎంచుకోండి");
return;
}

const correct =
selectedQuestions[currentQuestion].a;

const allOptions =
document.querySelectorAll(".option");

allOptions.forEach(opt=>{

opt.style.pointerEvents="none";

if(opt.innerHTML === correct){

opt.classList.add("correct");
}

if(
opt.innerHTML === selectedOption &&
selectedOption !== correct
){

opt.classList.add("wrong");
}

});

if(selectedOption === correct){

score++;

document.getElementById("resultText").innerHTML =
"✅ సరైన సమాధానం";

}else{

document.getElementById("resultText").innerHTML =
`❌ తప్పు సమాధానం <br><br> ✅ సరైన సమాధానం : ${correct}`;
}

setTimeout(()=>{

currentQuestion++;

if(currentQuestion < selectedQuestions.length){

showQuestion();

}else{

finishQuiz();
}

},2200);

}

/* FINISH */

async function finishQuiz(){

document.getElementById("quizBox").style.display="none";

document.getElementById("scoreBox").style.display="block";

document.getElementById("finalScore").innerHTML =
`${username} గారి స్కోర్ : ${score}/${questionLimit} 🔥`;

await addDoc(
collection(db,selectedLevel + "_leaderboard"),
{
name:username,
score:score
}
);

loadLeaderboard();
}

/* LEADERBOARD */

async function loadLeaderboard(){

if(selectedLevel === ""){
return;
}

const leaderboardList =
document.getElementById("leaderboardList");

leaderboardList.innerHTML =
"<div class='loading'>Loading...</div>";

const q =
query(
collection(db,selectedLevel + "_leaderboard"),
orderBy("score","desc"),
limit(10)
);

const querySnapshot =
await getDocs(q);

leaderboardList.innerHTML = "";

let rank = 1;

querySnapshot.forEach((doc)=>{

const data = doc.data();

leaderboardList.innerHTML += `

<div class="player">

<span class="rank">
${rank}. ${data.name}
</span>

<span class="score">
${data.score}
</span>

</div>

`;

rank++;

});

}

</script>
