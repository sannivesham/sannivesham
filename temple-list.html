<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>దేవాలయాలు - సన్నివేశం</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="temples-body">
  <div class="temples-bg"></div>
  <nav class="glass-navbar">
    <a href="temples.html">← వెనుకకు</a>
    <a href="index.html">ప్రారంభం</a>
    <a href="temples.html">దేవాలయాలు</a>
  </nav>
  <section class="temples-page">
    <div class="temples-title-box">
      <h1 id="categoryTitle">దేవాలయాలు</h1>
    </div>
    <div class="temples-grid" id="templeListGrid">
      
    </div>
  </section>
  <footer class="simple-footer">
    <p class="footer-quote">✨ దేవాలయాలు భారతీయ సంస్కృతికి ప్రతీకలు ✨</p>
    <script type="module" src="social-links.js"></script>
    <p>© 2026 సన్నివేశం</p>
  </footer>
  <script src="script.js"></script>
  <script type="module">
  import { db } from "./firebase-config.js";
  import {
    doc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
  async function loadTemplesBackground() {
    const snap = await getDoc(doc(db, "settings", "backgrounds"));
    if (!snap.exists()) return;
    const data = snap.data();
    const bg = document.querySelector(".temples-bg");
    if (window.innerWidth <= 700 && data.templesMobile) {
      bg.style.backgroundImage =
        `linear-gradient(rgba(10,5,0,0.62), rgba(10,5,0,0.68)), url("${data.templesMobile}")`;
    } else if (data.templesPc) {
      bg.style.backgroundImage =
        `linear-gradient(rgba(10,5,0,0.68), rgba(10,5,0,0.72)), url("${data.templesPc}")`;
    }
  }
  loadTemplesBackground();
</script>
<script type="module" src="temple-list.js"></script>
<audio id="bgMusic" loop>
  <source src="music/traditional.mp3" type="audio/mpeg">
</audio>
<button id="musicBtn" class="music-btn">
  🔊
</button>
<script src="music.js"></script>
</body>
</html>
