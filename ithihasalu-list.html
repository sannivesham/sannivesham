<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>శ్లోకాలు - సన్నివేశం</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .shloka-index-list {
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 60px;
    }
    .shloka-index-card {
      background: rgba(20,12,5,0.65);
      border: 1px solid rgba(255,209,102,0.25);
      border-radius: 16px;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      text-decoration: none;
      color: white;
      backdrop-filter: blur(10px);
      transition: 0.2s ease;
    }
    .shloka-index-card:hover {
      border-color: #ffd166;
      background: rgba(255,209,102,0.07);
    }
    .shloka-number-badge {
      background: rgba(255,209,102,0.15);
      border: 1px solid rgba(255,209,102,0.4);
      border-radius: 10px;
      padding: 6px 14px;
      color: #ffd166;
      font-weight: bold;
      font-size: 15px;
      min-width: 60px;
      text-align: center;
    }
    .shloka-preview {
      flex: 1;
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .shloka-arrow { color: #ffd166; font-size: 20px; }
  </style>
</head>

    <a href="ithihasalu.html">ఇతిహాసాలు</a>
  </nav>

  <section class="stories-page">
    <div class="stories-title-box">
      <h1 id="subTitle">శ్లోకాలు</h1>
    </div>
    <div class="shloka-index-list" id="shlokaList"></div>
  </section>

  <footer class="simple-footer">
    <p class="footer-quote">✨ ఇతిహాసాలు మన జాతి గర్వం ✨</p>
    <script type="module" src="social-links.js"></script>
    <p>© 2026 సన్నివేశం</p>
  </footer>

  <script src="script.js"></script>
  <script type="module" src="ithihasalu-list.js"></script>
  <audio id="bgMusic" loop>
    <source src="music/traditional.mp3" type="audio/mpeg">
  </audio>
  <button id="musicBtn" class="music-btn">🔊</button>
  <script src="music.js"></script>
