<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body class="temple-detail-body">
  <div class="temples-bg"></div>
  <nav class="glass-navbar">
    <a id="backToListLink" href="temples.html">← వెనుకకు</a>
    <a href="index.html">ప్రారంభం</a>
    <a href="temples.html">దేవాలయాలు</a>
  </nav>
  <section class="festival-detail-page">
    <article class="festival-detail-box" id="templeDetailBox">
      <h1>Loading...</h1>
    </article>
  </section>
  <footer class="simple-footer">
    <p class="footer-quote" id="templeFooterQuote">
      ✨ దేవాలయాలు భారతీయ సంస్కృతికి ప్రతీకలు ✨
    </p>
<script type="module" src="social-links.js"></script>    <p>© 2026 సన్నివేశం</p>
  </footer>
  <script type="module" src="temple-detail.js"></script>
  <script src="script.js"></script>
  <script type="module">
    import { db } from "./firebase-config.js";
    import {
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    async function loadTempleDetailBackground() {
      const snap = await getDoc(doc(db, "settings", "backgrounds"));
      if (!snap.exists()) return;
      const data = snap.data();
      const bg = document.querySelector(".temples-bg");
      if (!bg) return;
      if (window.innerWidth <= 700 && data.templesMobile) {
        bg.style.backgroundImage =
          `linear-gradient(rgba(10,5,0,0.62), rgba(10,5,0,0.68)), url("${data.templesMobile}")`;
      } else if (data.templesPc) {
        bg.style.backgroundImage =
          `linear-gradient(rgba(10,5,0,0.68), rgba(10,5,0,0.72)), url("${data.templesPc}")`;
      }
    }
    loadTempleDetailBackground();
  </script>
<audio id="bgMusic" loop>
  <source src="music/traditional.mp3" type="audio/mpeg">
</audio>
<button id="musicBtn" class="music-btn">
  🔊
</button>
<script src="music.js"></script>
</body>
</html>
